services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: fyp-api
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    depends_on:
      - db
  
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: fyp-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./dashboard:/app
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:4000
  db:
    image: postgres:15
    container_name: fyp_postgres
    restart: always
    environment:
      POSTGRES_USER: forensic
      POSTGRES_PASSWORD: forensicpass
      POSTGRES_DB: fyp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
